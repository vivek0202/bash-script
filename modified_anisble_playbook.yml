---
- name: Deploy AppDeploy Application
  hosts: all
  become: yes
  vars:
    app_name: "AppDeploy"
    app_version: ""
    Bind_Skip: ""
    region: ""
    lregion: ""
    sqlbindcleanarg: "yes"
    downloadarg: "yes"
    secondHost: 0
    secondIp: ""
    BASE_DIRECTORY: "/opt/appstage/stage"
    LOG: "/opt/appstage/stage/logs/{{ app_name }}.{{ ansible_date_time.iso8601 }}.log"
    PROD_HOME: "/opt/appstage/stage/opt/appstage_pc"
    APPVER_DIR: "{{ PROD_HOME }}/{{ app_version }}"
    REGION_DIR: "{{ APPVER_DIR }}/{{ region }}"
    ARCHIVE_FILE: "APPDEPLOY.tar"
    PACKAGE_DIR: "{{ REGION_DIR }}/package"
    TOSERV: ""
  tasks:
    - name: Set environment variables
      set_fact:
        ansible_env:
          PATH: "/usr/local/bin:/bin:/usr/bin:/usr/local/sbin:/usr/sbin:/sbin:/usr/seos/bin:/bin:/usr/bin:/etc:/usr/sbin:/usr/ucb:{{ ansible_env.PATH }}"

    - name: Rsync deployments to servers
      block:
        - name: Determine TOSERV based on region
          set_fact:
            TOSERV: |
              {% if secondHost == 0 %}
                {% if KEEP_REGION in ['AD', 'AE', 'AF', 'AH'] %}
                  {{ lookup('file', '/opt/appstage/deployments/timebeanhosts') }}
                  {{ aenap_managed_host_2 }}
                {% elif KEEP_REGION == 'PD' %}
                  "app-server-01.example.internal app-server-02.example.internal app-server-03.example.internal app-server-04.example.internal app-server-05.example.internal app-server-06.example.internal app-server-07.example.internal"
                {% elif KEEP_REGION == 'GV' %}
                  ""
                {% else %}
                  "invalid"
                {% endif %}
              {% else %}
                {{ secondIp }}
              {% endif %}
          when: secondHost == 0

        - name: Fail if region is invalid
          fail:
            msg: "{{ region }} is not valid"
          when: TOSERV == "invalid"

        - name: Rsync files to servers
          synchronize:
            src: "{{ item.src }}"
            dest: "{{ item.dest }}"
            delete: yes
          with_items:
            - { src: "/opt/appstage/deployments/scripts/", dest: "{{ item }}:/opt/appstage/deployments/scripts/" }
            - { src: "/opt/appstage/deployments/HealthCheck/", dest: "{{ item }}:/opt/appstage/deployments/HealthCheck/" }
            - { src: "/opt/appstage/deployments/Logging/", dest: "{{ item }}:/opt/appstage/deployments/Logging/" }
            - { src: "/opt/appstage/deployments/Management/", dest: "{{ item }}:/opt/appstage/deployments/Management/" }
            - { src: "/opt/appstage/deployments/OaTSS/", dest: "{{ item }}:/opt/appstage/deployments/OaTSS/" }
            - { src: "/opt/appstage/deployments/NSS/", dest: "{{ item }}:/opt/appstage/deployments/NSS/" }
            - { src: "/opt/appstage/deployments/ProvCtlTimer/", dest: "{{ item }}:/opt/appstage/deployments/ProvCtlTimer/" }
            - { src: "/opt/appstage/deployments/ProvisionController/", dest: "{{ item }}:/opt/appstage/deployments/ProvisionController/" }
            - { src: "/opt/appstage/deployments/sqlj-PRISM/", dest: "{{ item }}:/opt/appstage/deployments/sqlj-PRISM/" }
            - { src: "/opt/appstage/AppController/apps/config/", dest: "{{ item }}:/opt/appstage/AppController/apps/config/", exclude: "*-HealthCheck.txt" }
          loop: "{{ TOSERV.split() }}"

    - name: Log deployment completion
      debug:
        msg: "Deploy of AppDeploy Complete: {{ ansible_date_time.iso8601 }}"

    - name: Update deployment version
      block:
        - name: Remove old deployment version
          lineinfile:
            path: /opt/appstage/deployments/cur_deployment_version.txt
            state: absent
            regexp: "^{{ app_name }}"

        - name: Add new deployment version
          lineinfile:
            path: /opt/appstage/deployments/cur_deployment_version.txt
            line: "{{ app_name }} {{ app_version }} {{ ansible_date_time.iso8601 }}"

    - name: Remove active deployment file
      file:
        path: /opt/appstage/stage/active_deployment_running
        state: absent

    - name: Clean up old deployments and logs
      block:
        - name: Remove old deployments
          find:
            paths: /opt/appstage/stage/opt/appstage_pc
            age: 60d
            recurse: yes
            patterns: "*"
            file_type: directory
            register: old_deployments

        - name: Remove old deployment directories
          file:
            path: "{{ item.path }}"
            state: absent
          with_items: "{{ old_deployments.files }}"

        - name: Remove old logs
          find:
            paths: /opt/appstage/stage/logs
            age: 60d
            recurse: yes
            patterns: "{{ app_name }}.*"
            file_type: file
            register: old_logs

        - name: Remove old log files
          file:
            path: "{{ item.path }}"
            state: absent
          with_items: "{{ old_logs.files }}"
